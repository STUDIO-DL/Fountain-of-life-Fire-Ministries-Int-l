<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctanos</title>

    <!-- FUENTE -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Poppins', sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* CONTENEDOR */
        .contact-container{
            width: 100%;
            max-width: 1100px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);

            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        /* LADO IZQUIERDO */
        .contact-info{
            background: linear-gradient(to bottom, #0057ff, #003ecb);
            color: white;
            padding: 60px 40px;

            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-info h2{
            font-size: 36px;
            margin-bottom: 20px;
        }

        .contact-info p{
            line-height: 1.8;
            margin-bottom: 30px;
            color: #e6e6e6;
        }

        .info-box{
            margin-bottom: 20px;
        }

        .info-box h4{
            margin-bottom: 5px;
            font-size: 18px;
        }

        .info-box span{
            color: #d9d9d9;
            font-size: 15px;
        }

        /* FORMULARIO */
        .contact-form{
            padding: 50px 40px;
            background: white;
        }

        .contact-form h3{
            font-size: 30px;
            margin-bottom: 10px;
            color: #222;
        }

        .contact-form p{
            color: #666;
            margin-bottom: 30px;
        }

        .form-group{
            margin-bottom: 20px;

            display: flex;
            flex-direction: column;
        }

        .form-group label{
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea{
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus{
            border-color: #0057ff;
            outline: none;
            box-shadow: 0 0 8px rgba(0,87,255,0.2);
        }

        textarea{
            resize: none;
        }

        /* BOTON */
        .submit-btn{
            width: 100%;
            background: #0057ff;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover{
            background: #003ecb;
            transform: translateY(-2px);
        }

        /* RESPONSIVE */
        @media(max-width: 850px){

            .contact-container{
                grid-template-columns: 1fr;
            }

            .contact-info{
                text-align: center;
            }

        }

    </style>
</head>

<body>

    <div class="contact-container">

        
        <div class="contact-info">

            <h2>Contáctanos</h2>

            <p>
                Nos encantaría conocerte, acompañarte y ayudarte a dar tus primeros pasos
                en esta familia de fe.
            </p>

            <div class="info-box">
                <h4>Dirección</h4>
                <span>Malabo, Guinea Ecuatorial</span>
            </div>

            <div class="info-box">
                <h4>Correo</h4>
                <span>info@iglesia.com</span>
            </div>

            <div class="info-box">
                <h4>Teléfono</h4>
                <span>+240 222 000 000</span>
            </div>

        </div>

        
        <div class="contact-form">

            <h3>Envíanos un mensaje</h3>

            <p>Completa el formulario y te responderemos lo antes posible.</p>

            <form>

                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" placeholder="Tu nombre">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" placeholder="Tu número">
                </div>

                <div class="form-group">
                    <label for="subject">Asunto</label>

                    <select id="subject">
                        <option>Consulta General</option>
                        <option>Petición de Oración</option>
                        <option>Compartir Testimonio</option>
                        <option>Soy Nuevo Aquí</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Mensaje</label>

                    <textarea id="message" rows="5" placeholder="¿Cómo podemos ayudarte?"></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    Enviar Mensaje
                </button>

            </form>

        </div>

    </div>

</body>
</html>
