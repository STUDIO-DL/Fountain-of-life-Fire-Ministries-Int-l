<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contactanos</title>
<style>

.contact-container {
    max-width: 600px;
    margin: 50px auto;
    padding: 30px;
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    display: flexbox;
    
}

.contact-container h2 {
    color: rgb(0, 98, 255);
    margin-bottom: 10px;
   
}

.contact-container p {
    color: #666;
    margin-bottom: 30px;
    line-height: 1.6;
}

.form-group {
    text-align: left;
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 5px;
    color: #333;
}

.form-group input, 
.form-group select, 
.form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box; 
}

.submit-btn {
    background-color:blue; 
    color: white;
    padding: 15px 30px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: background 0.3s ease;
    width: 100%;
}

.submit-btn:hover {
    background-color: #333;
}
body{
    background-color: #ffffff;
}

</style>

</head>
<body>
    <div class="contact-container">
    <h2>PONTE EN CONTACTO CON NOSOTROS</h2>
    <p>Nos encantaría conocerte, acompañarte y ayudarte a dar tus primeros pasos en esta familia de fé.</p>
    
    <form action="#" method="POST" class="contact-form">
        <div class="form-group">
            <label for="name">Nombre Completo</label>
            <input type="text" id="name" name="name" placeholder="Tu nombre" required>
        </div>
        
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Teléfono (Opcional)</label>
            <input type="tel" id="phone" name="phone" placeholder="Tu número de teléfono">
        </div>
        
        <div class="form-group">
            <label for="subject">Asunto</label>
            <select id="subject" name="subject">
                <option value="general">Consulta General</option>
                <option value="prayer">Petición de Oración</option>
                <option value="testimony">Compartir Testimonio </option>
                <option value="new">Soy Nuevo Aquí </option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="message">Mensaje</label>
            <textarea id="message" name="message" rows="5" placeholder="¿Cómo podemos ayudarte?" required></textarea>
        </div>
        
        <button type="submit" class="submit-btn">Enviar Mensaje</button>
    </form>
</div>
</body>
</html>
